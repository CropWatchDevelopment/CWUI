name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@cropwatchdevelopment'
          cache: 'pnpm'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CWUI_PUBLISH_TOKEN || secrets.GITHUB_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm run package

      - name: Check package version on registry
        id: package_check
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if npm view "@cropwatchdevelopment/cwui@$VERSION" version --registry=https://npm.pkg.github.com > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already exists in registry; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION not found in registry; publishing."
          fi

      - name: Publish package
        if: steps.package_check.outputs.exists != 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CWUI_PUBLISH_TOKEN || secrets.GITHUB_TOKEN }}
